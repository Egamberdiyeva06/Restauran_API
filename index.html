<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Restaurant Pro Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-gray-900 text-white p-6">
    <h1 class="text-2xl mb-6 font-bold">🍽 Admin</h1>

    <button onclick="openSection('category')" class="block w-full text-left p-2 hover:bg-gray-700 rounded">Categories</button>
    <button onclick="openSection('menu')" class="block w-full text-left p-2 hover:bg-gray-700 rounded">Menu</button>
    <button onclick="openSection('orderItem')" class="block w-full text-left p-2 hover:bg-gray-700 rounded">Order Items</button>
    <button onclick="openSection('order')" class="block w-full text-left p-2 hover:bg-gray-700 rounded">Orders</button>

  </aside>

  <!-- CONTENT -->
  <main class="flex-1 p-6 overflow-auto">

    <!-- CATEGORY -->
    <section id="category" class="hidden">
      <h2 class="text-xl font-bold mb-4">Categories</h2>

      <input id="catName" class="border p-2" placeholder="Name"/>
      <button onclick="createCategory()" class="bg-blue-600 text-white px-4 py-2">Add</button>

      <div id="catList" class="mt-4"></div>
    </section>

    <!-- MENU -->
    <section id="menu" class="hidden">
      <h2 class="text-xl font-bold mb-4">Menu</h2>

      <input id="menuName" class="border p-2" placeholder="Name"/>
      <input id="menuPrice" class="border p-2" placeholder="Price"/>
      <select id="menuCategory" class="border p-2"></select>

      <button onclick="createMenu()" class="bg-green-600 text-white px-4 py-2">Add</button>

      <div id="menuList" class="mt-4"></div>
    </section>

    <!-- ORDER ITEMS -->
    <section id="orderItem" class="hidden">
      <h2 class="text-xl font-bold mb-4">Order Items</h2>

      <select id="oiOrderId" class="border p-2"></select>
      <select id="oiMenuId" class="border p-2"></select>
      <input id="oiQty" class="border p-2" placeholder="Qty"/>

      <button onclick="createOrderItem()" class="bg-yellow-500 px-4 py-2">Add</button>

      <div id="oiList" class="mt-4"></div>
    </section>

    <!-- ORDERS -->
    <section id="order" class="hidden">
      <h2 class="text-xl font-bold mb-4">Orders</h2>

      <input id="address" class="border p-2" placeholder="Address"/>
      <input id="phone" class="border p-2" placeholder="Phone"/>

      <button onclick="createOrder()" class="bg-purple-600 text-white px-4 py-2">Create</button>

      <div id="orderList" class="mt-4"></div>
    </section>

  </main>
</div>

<script>
const API = "http://127.0.0.1:8000/api";

function openSection(id){
  document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

/* CATEGORY */
async function loadCategories(){
  const res = await fetch(`${API}/categories/`);
  const data = await res.json();

  document.getElementById('catList').innerHTML =
    data.map(c=>`<div class="bg-white p-2 m-2">${c.name}</div>`).join('');

  document.getElementById('menuCategory').innerHTML =
    data.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

async function createCategory(){
  await fetch(`${API}/categories/`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:catName.value})
  });
  loadCategories();
}

/* MENU */
async function loadMenu(){
  const res = await fetch(`${API}/menu_items/`);
  const data = await res.json();

  document.getElementById('menuList').innerHTML =
    data.map(m=>`<div class="bg-white p-2 m-2">${m.name} - ${m.price}</div>`).join('');

  document.getElementById('oiMenuId').innerHTML =
    data.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
}

async function createMenu(){
  await fetch(`${API}/menu_items/`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:menuName.value,
      price:menuPrice.value,
      category_id:menuCategory.value
    })
  });
  loadMenu();
}

/* ORDER ITEM */
async function loadOrderItems(){
  const res = await fetch(`${API}/order_items/`);
  const data = await res.json();

  document.getElementById('oiList').innerHTML =
    data.map(o=>`
      <div class="bg-white p-2 m-2">
        Menu:${o.menu_item_id} | Qty:${o.quantity} | Total:${o.total}
        <button onclick="deleteOrderItem(${o.id})" class="bg-red-500 text-white px-2">X</button>
      </div>
    `).join('');
}

async function createOrderItem(){
  await fetch(`${API}/order_items/`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      order_id:oiOrderId.value,
      menu_item_id:oiMenuId.value,
      quantity:Number(oiQty.value)
    })
  });
  loadOrderItems();
}

async function deleteOrderItem(id){
  await fetch(`${API}/order_items/${id}`,{method:"DELETE"});
  loadOrderItems();
}

/* ORDERS */
async function loadOrders(){
  const res = await fetch(`${API}/orders/`);
  const data = await res.json();

  document.getElementById('orderList').innerHTML =
    data.map(o=>`
      <div class="bg-white p-2 m-2">
        <b>Order #${o.id}</b><br>
        Total: ${o.total}<br>
        Status: ${o.status}

        <select onchange="updateStatus(${o.id},this.value)">
          <option>pending</option>
          <option>processing</option>
          <option>delivered</option>
        </select>
      </div>
    `).join('');
}

async function updateStatus(id,status){
  await fetch(`${API}/orders/${id}/status`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(status)
  });
  loadOrders();
}

async function createOrder(){
  await fetch(`${API}/orders/`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      adress:address.value,
      phone_number:phone.value,
      items:[]
    })
  });
  loadOrders();
}

/* INIT */
openSection('category');
loadCategories();
loadMenu();
loadOrders();
loadOrderItems();

</script>

</body>
</html>
